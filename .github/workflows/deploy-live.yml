name: Deploy to Production

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest

    concurrency:
      group: deploy-production-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: 🛠️ Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          show-progress: false

      - name: 🌐 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: 📦 Install dependencies
        run: |
          npm ci --no-fund --no-audit --prefer-offline --progress=false
          npm audit fix --force || true

      - name: 💾 Cache Next.js Build
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
            .next/standalone
            out
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - name: 🔧 Create .env file
        run: |
          cat > .env << EOL
          NEXT_PUBLIC_APP_URL=${{ secrets.PRODUCTION_APP_URL }}
          NEXT_PUBLIC_ENVIRONMENT=production
          NEXT_PUBLIC_MAKE_WEBHOOK_URL=${{ secrets.MAKE_WEBHOOK_URL }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          SMTP_FROM=${{ secrets.SMTP_FROM }}
          CONTACT_EMAIL=${{ secrets.CONTACT_EMAIL }}
          FTP_SERVER=${{ secrets.PRODUCTION_FTP_SERVER }}
          FTP_USERNAME=${{ secrets.PRODUCTION_FTP_USERNAME }}
          FTP_PASSWORD=${{ secrets.PRODUCTION_FTP_PASSWORD }}
          ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          CUSTOMER_USERNAME=${{ secrets.CUSTOMER_USERNAME }}
          CUSTOMER_PASSWORD=${{ secrets.CUSTOMER_PASSWORD }}
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_ID=${{ secrets.GOOGLE_CSE_ID }}
          EOL

      - name: 🚧 Aktiviere Wartungsmodus
        uses: appleboy/ssh-action@v1.0.3
        continue-on-error: true
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            cd callflows.de/
            touch .maintenance

      - name: 🗄️ Simple Production Backup
        uses: appleboy/ssh-action@v1.0.3
        continue-on-error: true
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            cd callflows.de/
            timestamp=$(date +%Y%m%d_%H%M%S)
            
            # 🎯 EINZELENTWICKLER PRODUCTION BACKUP
            mkdir -p backups
            
            # Nur 1 Production Backup (GitHub = Rollback!)
            echo "📦 Creating production backup..."
            timeout 90s tar -czf backups/production-${timestamp}.tar.gz \
              --exclude='backups/*' \
              --exclude='logs/*' \
              --exclude='.maintenance' \
              --exclude='node_modules/*' \
              --exclude='.git/*' \
              --exclude='*.log' \
              --max-size=75M \
              . 2>/dev/null || echo "Production backup completed with warnings"
            
            # 2 Production Backups behalten (der neueste + der vorletzte)
            cd backups
            ls -t *.tar.gz 2>/dev/null | tail -n +3 | xargs rm -f 2>/dev/null || true
            cd ..
            
            echo "✅ Production dual backup completed (2 Backups + GitHub = Rollback!)"

      - name: 🧹 Empty remote directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            cd callflows.de/
            rm -rf * .env

      - name: 🏗️ Build
        run: npm run build

      - name: 📤 Deploy to Production
        env:
          FTP_SERVER: ${{ secrets.PRODUCTION_FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.PRODUCTION_FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.PRODUCTION_FTP_PASSWORD }}
          NODE_ENV: production

        run: |
          npm install --quiet ftp-deploy
          node scripts/deploy.js

      - name: 🔒 Protect admin area with Basic Auth (Production)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            set -e
            cd callflows.de/admin-dashboard/
            # Production verwendet echte Credentials
            PASS_HASH=$(openssl passwd -apr1 "${{ secrets.ADMIN_PASSWORD }}")
            cat > .htaccess << 'EOF'
            AuthType Basic
            AuthName "Production Admin - Restricted Access"
            AuthUserFile REPLACE_WITH_ABSOLUTE
            Require valid-user
            EOF
            # Replace placeholder with absolute path to .htpasswd
            sed -i "s|REPLACE_WITH_ABSOLUTE|$(pwd)/.htpasswd|g" .htaccess
            echo "${{ secrets.ADMIN_USERNAME }}:${PASS_HASH}" > .htpasswd
            chmod 640 .htpasswd
            echo "Basic Auth enabled for production admin-dashboard/"

      - name: 🔐 Inject server env for PHP endpoints (Production)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            set -e
            cd callflows.de/
            # Create Apache env vars via .htaccess at site root (only for PHP to read via getenv)
            # Production verwendet echte Credentials
            printf "\n# Env for PHP endpoints (Production)\n" >> .htaccess || true
            printf "SetEnvIfNoCase Request_URI \".*\" ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}\n" >> .htaccess
            printf "SetEnvIfNoCase Request_URI \".*\" ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}\n" >> .htaccess
            printf "SetEnvIfNoCase Request_URI \".*\" CUSTOMER_USERNAME=${{ secrets.CUSTOMER_USERNAME }}\n" >> .htaccess
            printf "SetEnvIfNoCase Request_URI \".*\" CUSTOMER_PASSWORD=${{ secrets.CUSTOMER_PASSWORD }}\n" >> .htaccess
            echo "Server env for PHP endpoints injected (Production)"

      - name: 🧹 Clean npm cache
        run: |
          rm -rf node_modules
          rm -f package-lock.json

      - name: 🔍 Quick Production Check 
        uses: appleboy/ssh-action@v1.0.3
        continue-on-error: true
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            cd callflows.de/
            
            echo "🔍 Quick production check..."
            
            # Nur die wichtigsten Production Checks (schnell!)
            if [ -f "index.html" ] && [ -d "_next" ] && [ -f ".htaccess" ]; then
              echo "✅ Production deployment successful"
              echo "📊 Site ready: https://callflows.de"
            else
              echo "❌ Production deployment failed"
              echo "🔧 Check GitHub Actions logs"
            fi

      - name: 🟢 Deaktiviere Wartungsmodus
        if: always()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd callflows.de/
            rm -f .maintenance
            echo "🟢 Production maintenance mode disabled"

