name: Deploy to Staging

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    concurrency:
      group: deploy-staging-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: 🛠️ Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          show-progress: false

      - name: 🌐 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: 📦 Install dependencies
        run: |
          npm ci --no-fund --no-audit --prefer-offline --progress=false
          npm audit fix --force || true

      - name: 💾 Cache Next.js Build
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
            .next/standalone
            out
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - name: 🔧 Create .env file
        run: |
          cat > .env << EOL
          NEXT_PUBLIC_APP_URL=${{ secrets.STAGING_APP_URL }}
          NEXT_PUBLIC_ENVIRONMENT=staging
          NEXT_PUBLIC_MAKE_WEBHOOK_URL=${{ secrets.MAKE_WEBHOOK_URL }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          SMTP_FROM=${{ secrets.SMTP_FROM }}
          CONTACT_EMAIL=${{ secrets.CONTACT_EMAIL }}
          FTP_SERVER=${{ secrets.STAGING_FTP_SERVER }}
          FTP_USERNAME=${{ secrets.STAGING_FTP_USERNAME }}
          FTP_PASSWORD=${{ secrets.STAGING_FTP_PASSWORD }}
          ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          CUSTOMER_USERNAME=${{ secrets.CUSTOMER_USERNAME }}
          CUSTOMER_PASSWORD=${{ secrets.CUSTOMER_PASSWORD }}
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_ID=${{ secrets.GOOGLE_CSE_ID }}
          EOL

      - name: 🚧 Aktiviere Wartungsmodus
        uses: appleboy/ssh-action@v1.0.3
        continue-on-error: true
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            cd staging.callflows.de/
            touch .maintenance

      - name: 🗄️ Simple Backup (Einzelentwickler-optimiert)
        uses: appleboy/ssh-action@v1.0.3
        continue-on-error: true
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            cd staging.callflows.de/
            timestamp=$(date +%Y%m%d_%H%M%S)
            
            # 🎯 EINZELENTWICKLER BACKUP STRATEGY
            mkdir -p backups
            
            # Nur 1 Backup (GitHub ist dein Rollback!)
            echo "📦 Creating single backup..."
            timeout 60s tar -czf backups/last-deploy-${timestamp}.tar.gz \
              --exclude='backups/*' \
              --exclude='logs/*' \
              --exclude='.maintenance' \
              --exclude='node_modules/*' \
              --exclude='.git/*' \
              --exclude='*.log' \
              --max-size=50M \
              . 2>/dev/null || echo "Backup completed with warnings"
            
            # 2 Backups behalten (der neueste + der vorletzte)
            cd backups
            ls -t *.tar.gz 2>/dev/null | tail -n +3 | xargs rm -f 2>/dev/null || true
            cd ..
            
            echo "✅ Dual backup strategy completed (2 Backups + GitHub = Rollback!)"

      - name: 🧹 Empty remote directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            cd staging.callflows.de/
            rm -rf * .env
      
      - name: 🏗️ Build
        run: npm run build

      - name: 📤 Deploy to Staging
        env:
          FTP_SERVER: ${{ secrets.STAGING_FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.STAGING_FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.STAGING_FTP_PASSWORD }}
          NODE_ENV: staging
          
        run: |
          npm install --quiet ftp-deploy
          node scripts/deploy.js

      - name: 🔒 Protect admin area with Basic Auth (Staging)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            set -e
            cd staging.callflows.de/admin-dashboard/
            # Staging verwendet Test-Credentials für identische Umgebung
            STAGING_ADMIN_USER="staging-admin"
            STAGING_ADMIN_PASS="staging-test-2024"
            PASS_HASH=$(openssl passwd -apr1 "${STAGING_ADMIN_PASS}")
            cat > .htaccess << 'EOF'
            AuthType Basic
            AuthName "Staging Admin - Test Environment"
            AuthUserFile REPLACE_WITH_ABSOLUTE
            Require valid-user
            EOF
            # Replace placeholder with absolute path to .htpasswd
            sed -i "s|REPLACE_WITH_ABSOLUTE|$(pwd)/.htpasswd|g" .htaccess
            echo "${STAGING_ADMIN_USER}:${PASS_HASH}" > .htpasswd
            chmod 640 .htpasswd
            echo "Basic Auth enabled for staging admin-dashboard/"

      - name: 🔐 Inject server env for PHP endpoints (Staging)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            set -e
            cd staging.callflows.de/
            # Create Apache env vars via .htaccess at site root (only for PHP to read via getenv)
            # Staging verwendet Test-Credentials
            printf "\n# Env for PHP endpoints (Staging)\n" >> .htaccess || true
            printf "SetEnvIfNoCase Request_URI \".*\" ADMIN_USERNAME=staging-admin\n" >> .htaccess
            printf "SetEnvIfNoCase Request_URI \".*\" ADMIN_PASSWORD=staging-test-2024\n" >> .htaccess
            printf "SetEnvIfNoCase Request_URI \".*\" CUSTOMER_USERNAME=staging-customer\n" >> .htaccess
            printf "SetEnvIfNoCase Request_URI \".*\" CUSTOMER_PASSWORD=staging-test-2024\n" >> .htaccess
            echo "Server env for PHP endpoints injected (Staging)"

      - name: 🧹 Clean npm cache
        run: |
          rm -rf node_modules
          rm -f package-lock.json

      - name: 🔍 Quick Health Check 
        uses: appleboy/ssh-action@v1.0.3
        continue-on-error: true
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            cd staging.callflows.de/
            
            echo "🔍 Quick health check..."
            
            # Nur die wichtigsten Checks (schnell!)
            if [ -f "index.html" ] && [ -d "_next" ]; then
              echo "✅ Basic deployment successful"
              echo "📊 Site ready: https://staging.callflows.de"
            else
              echo "❌ Basic deployment failed"
              echo "🔧 Check GitHub Actions logs"
            fi

      - name: 🟢 Deaktiviere Wartungsmodus
        if: always()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd staging.callflows.de/
            rm -f .maintenance
            echo "🟢 Maintenance mode disabled"
